<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >
  <title>GitHub Token Validator Glass — One File Tools</title>

  <style>
    /* ========================================
       Reset
    ======================================== */

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #8b5cf6;
      --secondary: #0ea5e9;
      --success: #22c55e;
      --error: #ef4444;
    }

    body {
      min-height: 100vh;
      font-family: "Segoe UI", sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem;

      background:
        radial-gradient(circle at top right,
          rgba(6, 182, 212, 0.8),
          transparent 25%),

        radial-gradient(circle at bottom left,
          rgba(249, 115, 22, 0.8),
          transparent 25%),

        radial-gradient(circle at left center,
          rgba(236, 72, 153, 0.7),
          transparent 20%),

        linear-gradient(
          135deg,
          #2e1065,
          #1e3a8a,
          #312e81
        );

      color: white;
    }

    .container {
      width: 100%;
      max-width: 950px;
    }

    .card {
      background: rgba(9, 13, 31, 0.88);

      backdrop-filter: blur(18px);

      border: 1px solid rgba(255,255,255,0.1);

      border-radius: 32px;

      padding: 3rem;

      box-shadow:
        0 0 40px rgba(139,92,246,.35),
        0 20px 50px rgba(0,0,0,.5);
    }

    header {
      text-align: center;
      margin-bottom: 3rem;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: .75rem;
    }

    .subtitle {
      color: #cbd5e1;
      font-size: 1.1rem;
    }

    label {
      display: block;
      margin-bottom: .75rem;
      font-size: 1.1rem;
      font-weight: 600;
    }

    .input-wrapper {
      position: relative;
    }

    input {
      width: 100%;
      padding: 1.2rem;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.05);
      color: white;
      font-size: 1rem;
    }

    input::placeholder {
      color: #94a3b8;
    }

    input:focus {
      outline: none;
      border-color: var(--secondary);
      box-shadow: 0 0 20px rgba(14,165,233,.3);
    }

    .toggle-btn {
      position: absolute;
      top: 50%;
      right: 20px;
      transform: translateY(-50%);
      background: transparent;
      border: none;
      color: white;
      cursor: pointer;
      font-size: 1.3rem;
    }

    .actions {
      margin-top: 2rem;

      display: grid;
      grid-template-columns: repeat(
        auto-fit,
        minmax(220px,1fr)
      );

      gap: 1rem;
    }

    button {
      padding: 1.2rem;
      border: none;
      border-radius: 18px;
      cursor: pointer;
      font-size: 1.05rem;
      font-weight: 700;
      transition: .3s;
    }

    .validate-btn {
      background:
        linear-gradient(
          90deg,
          #9333ea,
          #0ea5e9
        );

      color: white;
    }

    .clear-btn {
      background: rgba(255,255,255,.06);
      color: white;
    }

    button:hover {
      transform: translateY(-3px);
    }

    .grid {
      margin-top: 2rem;

      display: grid;

      grid-template-columns:
        repeat(auto-fit,minmax(180px,1fr));

      gap: 1rem;
    }

    .info-card {
      background: rgba(255,255,255,.04);

      border: 1px solid rgba(255,255,255,.08);

      border-radius: 24px;

      padding: 2rem;

      text-align: center;
    }

    .info-card h3 {
      color: #cbd5e1;
      margin-bottom: 1rem;
    }

    .info-card p {
      font-size: 1.1rem;
      font-weight: bold;
      word-break: break-word;
    }

    .status-box {
      margin-top: 2rem;

      padding: 1.5rem;

      border-radius: 20px;

      background: rgba(255,255,255,.04);

      border: 1px solid rgba(255,255,255,.08);

      text-align: center;
    }

    footer {
      margin-top: 2.5rem;
      text-align: center;
    }

    footer a {
      color: #38bdf8;
      text-decoration: none;
    }

    @media (max-width: 768px) {
      .card {
        padding: 1.5rem;
      }

      h1 {
        font-size: 2rem;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="card">

      <header>
        <h1>🔐 GitHub Token Validator</h1>

        <p class="subtitle">
          Validate GitHub Personal Access Tokens instantly.
        </p>
      </header>

      <main>

        <label for="token">
          GitHub Token
        </label>

        <div class="input-wrapper">

          <input
            type="password"
            id="token"
            placeholder="ghp_xxxxxxxxxxxxxxxxxx"
          >

          <button
            class="toggle-btn"
            id="toggleBtn"
          >
            👁️
          </button>

        </div>

        <div class="actions">

          <button
            class="validate-btn"
            id="validateBtn"
          >
            Validate Token
          </button>

          <button
            class="clear-btn"
            id="clearBtn"
          >
            Clear
          </button>

        </div>

        <section class="grid">

          <div class="info-card">
            <h3>Owner</h3>
            <p id="owner">-</p>
          </div>

          <div class="info-card">
            <h3>Expiry</h3>
            <p id="expiry">-</p>
          </div>

          <div class="info-card">
            <h3>Scopes</h3>
            <p id="scopes">-</p>
          </div>

          <div class="info-card">
            <h3>Status</h3>
            <p id="tokenStatus">-</p>
          </div>

        </section>

        <div
          class="status-box"
          id="statusMessage"
        >
          Results will appear here after validation.
        </div>

      </main>

      <footer>
        <p>
          Part of
          <a
            href="https://github.com/praveenscience/One-File-Tools"
          >
            One File Tools
          </a>
        </p>
      </footer>

    </div>
  </div>

  <script>
    const tokenInput =
      document.getElementById("token");

    const validateBtn =
      document.getElementById("validateBtn");

    const clearBtn =
      document.getElementById("clearBtn");

    const toggleBtn =
      document.getElementById("toggleBtn");

    const statusMessage =
      document.getElementById("statusMessage");

    const owner =
      document.getElementById("owner");

    const expiry =
      document.getElementById("expiry");

    const scopes =
      document.getElementById("scopes");

    const tokenStatus =
      document.getElementById("tokenStatus");

    toggleBtn.addEventListener("click", () => {
      tokenInput.type =
        tokenInput.type === "password"
          ? "text"
          : "password";
    });

    clearBtn.addEventListener("click", () => {
      tokenInput.value = "";

      owner.textContent = "-";
      expiry.textContent = "-";
      scopes.textContent = "-";
      tokenStatus.textContent = "-";

      statusMessage.textContent =
        "Results will appear here after validation.";
    });

    validateBtn.addEventListener(
      "click",
      async () => {

        let token = tokenInput.value.trim();

        if (!token) {
          alert("Please enter a token.");
          return;
        }

        statusMessage.textContent =
          "Validating token...";

        try {

          let response =  await fetch(
              "https://api.github.com/user",
              {
                headers: {
                  Authorization:
                    `Bearer ${token}`
                }
              }
            );

          if (!response.ok) {
            statusMessage.textContent =
              "❌ Invalid Token";

            tokenStatus.textContent =
              "Invalid";

            return;
          }

          let data = await response.json();

          owner.textContent =
            data.login || "Unknown";

          expiry.textContent =
            response.headers.get(
              "github-authentication-token-expiration"
            ) || "No Expiry Info";

          scopes.textContent =
            response.headers.get(
              "x-oauth-scopes"
            ) || "No Scopes";

          tokenStatus.textContent =
            "Valid";

          statusMessage.textContent =
            "✅ Token validated successfully.";

        } catch (error) {

          statusMessage.textContent =
            "❌ Unable to validate token.";

        }
      }
    );
  </script>

</body>
</html>
