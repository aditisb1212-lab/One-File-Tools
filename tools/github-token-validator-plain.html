<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Token Validator Plain — One File Tools</title>

    <style>
      /* ========================================
         Reset & Base
         ======================================== */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --primary: #0969da;
        --success: #1a7f37;
        --error: #cf222e;
        --border: #d0d7de;
        --bg: #f6f8fa;
        --card: #ffffff;
        --text: #24292f;
        --muted: #57606a;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Oxygen, Ubuntu, Cantarell, sans-serif;
        line-height: 1.6;
        min-height: 100vh;
        background: linear-gradient(135deg, #f6f8fa, #eef2f7);
        color: var(--text);
        padding: 2rem;
      }

      .container {
        max-width: 850px;
        margin: auto;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 2rem;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
      }

      header {
        text-align: center;
        margin-bottom: 2rem;
      }

      h1 {
        font-size: 2.2rem;
        margin-bottom: 0.5rem;
      }

      .subtitle {
        color: var(--muted);
      }

      .input-group {
        margin-bottom: 1.5rem;
      }

      label {
        display: block;
        font-weight: 600;
        margin-bottom: 0.6rem;
      }

      .token-wrapper {
        position: relative;
      }

      input {
        width: 100%;
        padding: 1rem;
        border: 1px solid var(--border);
        border-radius: 12px;
        font-size: 1rem;
        padding-right: 50px;
      }

      input:focus {
        outline: 3px solid rgba(9, 105, 218, 0.2);
        border-color: var(--primary);
      }

      .toggle-btn {
        position: absolute;
        top: 50%;
        right: 14px;
        transform: translateY(-50%);
        border: none;
        background: none;
        cursor: pointer;
        font-size: 1.1rem;
      }

      .actions {
        display: flex;
        gap: 1rem;
        flex-wrap: wrap;
      }

      button {
        border: none;
        cursor: pointer;
        border-radius: 12px;
        padding: 0.9rem 1.5rem;
        font-size: 1rem;
        font-weight: 600;
        transition: 0.2s;
      }

      .validate-btn {
        background: var(--primary);
        color: white;
      }

      .validate-btn:hover {
        opacity: 0.9;
      }

      .clear-btn {
        background: #eaeef2;
      }

      .clear-btn:hover {
        background: #d8dee4;
      }

      .status-box {
        margin-top: 2rem;
        display: none;
      }

      .status {
        padding: 1rem;
        border-radius: 12px;
        margin-bottom: 1rem;
        font-weight: 600;
      }

      .success {
        background: rgba(26, 127, 55, 0.1);
        color: var(--success);
      }

      .error {
        background: rgba(207, 34, 46, 0.1);
        color: var(--error);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 1rem;
      }

      .info-card {
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 1rem;
        background: #fafbfc;
      }

      .info-card h3 {
        font-size: 0.9rem;
        color: var(--muted);
        margin-bottom: 0.4rem;
      }

      .info-card p {
        word-break: break-word;
        font-weight: 600;
      }

      .loader {
        display: none;
        text-align: center;
        margin-top: 1rem;
      }

      footer {
        text-align: center;
        margin-top: 2rem;
        color: var(--muted);
      }

      footer a {
        color: var(--primary);
        text-decoration: none;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0d1117;
          --card: #161b22;
          --text: #e6edf3;
          --muted: #8b949e;
          --border: #30363d;
        }

        body {
          background: linear-gradient(135deg, #0d1117, #161b22);
        }

        .clear-btn {
          background: #21262d;
          color: white;
        }

        .clear-btn:hover {
          background: #30363d;
        }

        .info-card {
          background: #0d1117;
        }

        input {
          background: #0d1117;
          color: white;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="card">
        <header>
          <h1>🔐 GitHub Token Validator</h1>
          <p class="subtitle">
            Validate GitHub Personal Access Tokens and inspect their metadata.
          </p>
        </header>

        <main>
          <div class="input-group">
            <label for="token">GitHub Personal Access Token</label>

            <div class="token-wrapper">
              <input
                type="password"
                id="token"
                placeholder="ghp_xxxxxxxxxxxxxxxxxxxxx"
              />

              <button
                class="toggle-btn"
                id="toggleVisibility"
                aria-label="Toggle token visibility"
              >
                👁️
              </button>
            </div>
          </div>

          <div class="actions">
            <button class="validate-btn" id="validateBtn">
              Validate Token
            </button>

            <button class="clear-btn" id="clearBtn">Clear</button>
          </div>

          <div class="loader" id="loader">
            <p>Validating token...</p>
          </div>

          <section class="status-box" id="resultSection">
            <div id="statusMessage"></div>

            <div class="grid">
              <div class="info-card">
                <h3>Owner</h3>
                <p id="owner">-</p>
              </div>

              <div class="info-card">
                <h3>Token Expiry</h3>
                <p id="expiry">-</p>
              </div>

              <div class="info-card">
                <h3>Scopes</h3>
                <p id="scopes">-</p>
              </div>

              <div class="info-card">
                <h3>Status</h3>
                <p id="tokenStatus">-</p>
              </div>
            </div>
          </section>
        </main>
      </div>

      <footer>
        <p>
          Part of
          <a href="https://github.com/praveenscience/One-File-Tools">
            One File Tools
          </a>
        </p>
      </footer>
    </div>

    <script>
      const tokenInput = document.getElementById("token");
      const validateBtn = document.getElementById("validateBtn");
      const clearBtn = document.getElementById("clearBtn");
      const toggleBtn = document.getElementById("toggleVisibility");

      const loader = document.getElementById("loader");
      const resultSection = document.getElementById("resultSection");
      const statusMessage = document.getElementById("statusMessage");

      const owner = document.getElementById("owner");
      const expiry = document.getElementById("expiry");
      const scopes = document.getElementById("scopes");
      const tokenStatus = document.getElementById("tokenStatus");

      toggleBtn.addEventListener("click", () => {
        tokenInput.type =
          tokenInput.type === "password" ? "text" : "password";
      });

      clearBtn.addEventListener("click", () => {
        tokenInput.value = "";
        resultSection.style.display = "none";
      });

      validateBtn.addEventListener("click", async () => {
        const token = tokenInput.value.trim();

        if (!token) {
          alert("Please enter a GitHub token.");
          return;
        }

        loader.style.display = "block";
        resultSection.style.display = "none";

        try {
          const response = await fetch("https://api.github.com/user", {
            headers: {
              Authorization: `Bearer ${token}`,
              Accept: "application/vnd.github+json"
            }
          });

          loader.style.display = "none";
          resultSection.style.display = "block";

          if (!response.ok) {
            statusMessage.innerHTML = `
              <div class="status error">
                ❌ Invalid or expired token.
              </div>
            `;

            owner.textContent = "-";
            expiry.textContent = "-";
            scopes.textContent = "-";
            tokenStatus.textContent = "Invalid";
            return;
          }

          const data = await response.json();

          statusMessage.innerHTML = `
            <div class="status success">
              ✅ Token validated successfully.
            </div>
          `;

          owner.textContent = data.login || "Unknown";

          expiry.textContent =
            response.headers.get(
              "github-authentication-token-expiration"
            ) || "No Expiry Information";

          scopes.textContent =
            response.headers.get("x-oauth-scopes") || "No Scopes";

          tokenStatus.textContent = "Valid";
        } catch (error) {
          loader.style.display = "none";
          resultSection.style.display = "block";

          statusMessage.innerHTML = `
            <div class="status error">
              ❌ Unable to validate token.
            </div>
          `;
        }
      });
    </script>
  </body>
</html>
